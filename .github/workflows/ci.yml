name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Oldest supported (Package-Requires), a current stable, and the
        # development snapshot.
        emacs_version: ['29.1', '29.4', '30.1', 'snapshot']
    name: Emacs ${{ matrix.emacs_version }}
    steps:
      - uses: actions/checkout@v4

      - uses: purcell/setup-emacs@master
        with:
          version: ${{ matrix.emacs_version }}

      - name: Byte-compile
        run: make compile

      - name: Run ERT suite
        run: make test
